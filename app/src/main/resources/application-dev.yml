spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/kiln_dev
  flyway:
    clean-disabled: false   # dev only — prod must keep it true (default)

server:
  port: 8080

logging:
  level:
    root: INFO
    com.skyflux.kiln: DEBUG
    org.springframework.web: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

kiln:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000
