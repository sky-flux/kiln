server:
  port: 8080

logging:
  level:
    root: INFO
    com.skyflux.kiln: DEBUG
    org.springframework.web: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

kiln:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000
