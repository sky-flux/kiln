spring:
  application:
    name: kiln

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # Virtual Threads (Java 21+)
  threads:
    virtual:
      enabled: true

  # Jackson (Spring Boot 4 / Jackson 3 — defaults already match our needs;
  # fine-grained feature toggles live in Phase 2's JacksonConfig bean)
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
  tomcat:
    threads:
      max: 200
    accept-count: 100

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    com.skyflux.kiln: DEBUG
