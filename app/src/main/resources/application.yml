spring:
  application:
    name: kiln

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # Virtual Threads (Java 21+)
  threads:
    virtual:
      enabled: true

  # Datasource — profile-specific; Testcontainers @ServiceConnection overrides at test time
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/kiln}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: KilnHikariCP

  jooq:
    sql-dialect: POSTGRES

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # Jackson (Spring Boot 4 / Jackson 3 — defaults already match our needs;
  # fine-grained feature toggles live in Phase 2's JacksonConfig bean)
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
  tomcat:
    threads:
      max: 200
    accept-count: 100

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

# Sa-Token (Phase 4) — session lives in Redis (via sa-token-redis-jackson on
# classpath), token is read from the standard HTTP `Authorization: Bearer <...>`
# header. Defaults without this block are `satoken` / no-prefix — explicit here
# so the HTTP contract matches conventional clients.
sa-token:
  token-name: Authorization
  token-prefix: Bearer
  # 30-day session TTL; refresh on activity 15 min
  timeout: 2592000
  active-timeout: 900
  is-concurrent: true
  is-share: false
  is-log: false

logging:
  level:
    root: INFO
    com.skyflux.kiln: DEBUG
