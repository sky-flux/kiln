spring:
  datasource:
    url: ${DB_URL}     # fail-fast if missing (no default)
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      leak-detection-threshold: 60000   # 60s
  flyway:
    clean-disabled: true   # safety: never truncate prod
    validate-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

logging:
  level:
    root: WARN
    com.skyflux.kiln: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

kiln:
  cors:
    allowed-origins:
      - ${CORS_ALLOWED_ORIGIN}
