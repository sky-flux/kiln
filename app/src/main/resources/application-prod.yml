server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

logging:
  level:
    root: WARN
    com.skyflux.kiln: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

kiln:
  cors:
    allowed-origins:
      - ${CORS_ALLOWED_ORIGIN}
