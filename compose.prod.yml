# Production overlay — load explicitly:
#   docker compose -f compose.yml -f compose.prod.yml up -d
# Requires a .env file at repo root (copy from .env.template, gitignored).
#
# Build the app image first:  ./gradlew :app:bootBuildImage
# The image name it emits (e.g. docker.io/library/app:0.0.1-SNAPSHOT) goes into APP_IMAGE in .env.

services:
  app:
    image: ${APP_IMAGE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # Match the env-var contract in application.yml (${DB_URL} / ${DB_USERNAME} / ${DB_PASSWORD}).
      # Values derived from POSTGRES_* so the same .env seeds both the DB container and the app.
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN}
    ports:
      - "${APP_PORT:-8080}:8080"
    restart: unless-stopped
    # No healthcheck here: Paketo tiny run image (default bootBuildImage output)
    # has no curl/wget. If you need one, switch the builder to paketobuildpacks/builder-jammy-base
    # in build.gradle and add: test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
    deploy:
      resources:
        limits:
          memory: 1g

  postgres:
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    deploy:
      resources:
        limits:
          memory: 256m
