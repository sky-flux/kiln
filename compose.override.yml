# Placeholder for developer-local docker compose overrides.
#
# Previously, this file published postgres:5432 and redis:6379 to the host so
# that `./gradlew :app:bootRun` on the host could connect. Those port mappings
# now live in the base `compose.yml` because Spring Boot's docker-compose
# module can't auto-merge an override file (it invokes docker with a single
# `-f` flag, which disables override auto-merging).
#
# `docker compose up` still auto-merges this file in dev — add any
# developer-local tweaks here (extra tooling containers, ephemeral volumes,
# etc.). Keep production-shared changes in compose.yml instead.
