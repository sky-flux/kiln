# Development overrides — auto-loaded by `docker compose up`.
# Exposes DB and Redis to host so `./gradlew :app:bootRun` (on the host) can connect.
# Prod does NOT load this file, so prod keeps DB/Redis internal to the compose network.

services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
